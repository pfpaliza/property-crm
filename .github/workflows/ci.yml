name: CI

# Gate every push and PR on lint + the two test suites. A failing job here
# marks the check as failed, which blocks merges once the check is required
# in the repo's branch-protection settings (Settings > Branches).
on:
  push:
    branches: [main]
  pull_request:

jobs:
  unit:
    name: Lint & unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm test

  e2e:
    name: End-to-end tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: property_crm
        ports:
          - 5432:5432
        # Wait until Postgres is accepting connections before the job runs.
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/property_crm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      - name: Apply database migrations
        run: npm run db:migrate
      - name: Run Playwright tests
        run: npm run test:e2e

  # Apply pending migrations to the production database. Runs only after the
  # lint/unit and e2e gates pass, and only on a push to main (not on PRs or
  # forks), so a schema change can never reach prod without its migration
  # having gone first. Guards against the drift that took the app down: code
  # shipping a new enum value while the live DB still had the old enum.
  migrate-production:
    name: Migrate production database
    needs: [unit, e2e]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    # Bind to a GitHub Environment so the secret (and optionally required
    # reviewers) live in one place: Settings > Environments > production.
    environment: production
    env:
      # Set this secret to a migration-capable connection string — the Supabase
      # session pooler or direct connection (port 5432), NOT the transaction
      # pooler (6543), which can choke on DDL.
      DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - name: Apply migrations to production
        run: npm run db:migrate
